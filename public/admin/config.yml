backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blogs"
    label: "Blogs"
    folder: "content/blogs"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"

    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Category"
        name: "category"
        widget: "string"
        default: "General"

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"

      - label: "Read Time"
        name: "readTime"
        widget: "string"
        default: "5 min read"

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"

      - label: "Cover Image"
        name: "image"
        widget: "image"
        default: "/uploads/default-blog.jpg"

      - label: "Body"
        name: "body"
        widget: "markdown"